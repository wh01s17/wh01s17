name: generate tetris

on:
    schedule:
        - cron: "0 */12 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    generate:
        runs-on: ubuntu-latest

        steps:
            - uses: yoshi389111/github-profile-tetris@main
              with:
                  github_user_name: wh01s17

            - uses: crazy-max/ghaction-github-pages@v4
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
